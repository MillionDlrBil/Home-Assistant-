blueprint:
  name: Reolink Wifi Doorbell camera battery low notification
  description: Sends a high priority notification when below 20%, checks once a day.
  domain: automation
  source_url: https://github.com
  input:
    battery_sensor:
      name: Battery Sensor
      description: Select your Reolink doorbell battery sensor entity.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery
    notify_device:
      name: Notification Service
      description: Select the mobile app notification service for your phone (e.g., notify.mobile_app_billy_s25).
      selector:
        action: {}

mode: single

triggers:
  - at: "10:00:00"
    trigger: time

conditions:
  - condition: numeric_state
    entity_id: !input battery_sensor
    below: 20

actions:
  - action: !input notify_device
    data:
      title: "🪫 Doorbell Battery Low"
      message: >-
        The Reolink Doorbell battery is currently low at {{ states(trigger.entity_id) if trigger.entity_id is defined else states(blueprint.input.battery_sensor) }}%. Please recharge it soon.
      data:
        ttl: 0
        priority: high
        channel: Alarm
